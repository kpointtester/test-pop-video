<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Reels - Swiper CSS Disabled Example</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			body {
				margin: 0;
				padding: 20px;
				font-family: Arial, sans-serif;
				background: #f5f5f5;
			}
			h1 {
				font-size: 1.2rem;
				color: #333;
			}
			p {
				color: #666;
				font-size: 0.9rem;
			}
			.examples {
				display: flex;
				gap: 40px;
				flex-wrap: wrap;
			}
			.example-block {
				flex: 1;
				min-width: 300px;
			}
			.example-block h2 {
				font-size: 1rem;
				color: #555;
			}
			code {
				background: #e8e8e8;
				padding: 2px 6px;
				border-radius: 3px;
				font-size: 0.85rem;
			}
		</style>
	</head>

	<body>
		<h1>Swiper CSS Disabled - Reels Example</h1>
		<p>
			This demo loads the player with <code>swiperCss=false</code> so Swiper JS is loaded but its CSS is not.
			This is useful when you provide your own Swiper styles or want to avoid style conflicts.
		</p>

		<div class="examples">
			<div class="example-block">
				<h2>Player (swiperCss=false)</h2>
				<div id="vxplayer-container"></div>
			</div>
		</div>

		<script>
      const getVideoConfig = (videoId) => {
        switch (videoId) {
         case 'gcc-0b2a6071-4fa5-41c6-a602-550bdd9b507b':
            return {
              packageId: 'pankaj',
              state:"DRAFT"
            };

          default:
            return null;
        }
      };

      function initializeVXPlayer() {
        const container = document.querySelector('#vxplayer-container');
        const vxPlayer = window.VXPlayer(container, {
          hostname: 'showcase-qa.zencite.in',
          type: 'reels',
          autoScroll: true,
          videoIds: [
			      'gcc-21d5711a-8dd3-49e8-b6c0-010d178ae607',
           	'gcc-0b2a6071-4fa5-41c6-a602-550bdd9b507b',
          ],
          mode: 'page',
        });

        window.vx = vxPlayer;
        vx.getVideoConfig = getVideoConfig;
      }

      if (window.VXPlayer) {
        initializeVXPlayer();
      } else {
        document.addEventListener('vxplayerready', function () {
          initializeVXPlayer();
        });
      }
    </script>
		<script>
			document.addEventListener('kpw-onclick-button', function (e) {
				console.log('[kpw-onclick-button]', e.detail);
			});
    </script>
		<!-- Load with swiperCss=false: Swiper JS loads but Swiper CSS does not -->
		<script src="https://t3-cms.zencite.in/orca/media/embed/player-vx.js"></script>
		  <!-- <script src="/dist/vxplayer/index.umd.js"></script> -->
	</body>
</html>
